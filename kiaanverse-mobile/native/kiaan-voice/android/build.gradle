// KIAAN Voice Native — manually-registered Android library.
//
// REGISTRATION MODEL: this module is NOT autolinked. There is
// deliberately no expo-module.config.json at the workspace root.
// Instead, the `withKiaanSakhaVoicePackages` config plugin
// (apps/mobile/plugins/withKiaanSakhaVoicePackages.js) injects the
// `include ':kiaanverse-kiaan-voice-native'` line + projectDir mapping
// into apps/mobile/android/settings.gradle, plus the matching
// `implementation project(...)` dep into app/build.gradle and the
// runtime `packages.add(KiaanVoicePackage())` line into
// MainApplication.kt. See that plugin's header for why autolinker is
// bypassed (pnpm symlink causing dual-discovery → AGP namespace
// collision → the long-running `Unresolved reference: sakha` build
// failure).
//
// The KIAAN tier-1 voice Kotlin lives in this module's standard
// `src/main/java/com/mindvibe/kiaan/voice/` tree:
//
//   • KiaanVoiceManager           — state machine + lifecycle singleton
//   • KiaanComputeTrinity         — NPU/GPU/CPU task router
//   • KiaanWakeWordDetector       — TFLite NNAPI wake-word
//   • KiaanEngineOrchestrator     — Friend/Guidance/Navigation engines
//   • KiaanVoicePackage           — ReactPackage registration target
//
// The Sakha persona-specific Kotlin lives in the sibling
// `kiaanverse-mobile/native/sakha-voice/android/` module. The two
// source trees are physically disjoint so kotlinc cannot accidentally
// compile Sakha sources into this .aar — Step 54 fix for the R8
// duplicate-class error where `java.exclude '**/sakha/**'` was honored
// by javac but ignored by kotlinc, producing PauseEvent$Filter /
// VerseSegment / etc. in BOTH .aar files and triggering R8 dex-merge
// collisions.
//
// Pattern mirrors kiaanverse-mobile/native/sakha-voice/android/build.gradle
// so AGP / Kotlin / JVM versions stay consistent.

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'com.kiaanverse.kiaan.voice'
version = '0.0.0'

def TFLITE_VERSION = '2.14.0'
def COROUTINES_VERSION = '1.7.3'

android {
    namespace 'com.mindvibe.kiaan.voice'
    compileSdk safeExtGet('compileSdkVersion', 35)
    buildToolsVersion safeExtGet('buildToolsVersion', '35.0.0')

    defaultConfig {
        minSdk safeExtGet('minSdkVersion', 24)
        targetSdk safeExtGet('targetSdkVersion', 35)
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }

    // AGP 8 + Gradle 8 require explicit publishing config for library
    // modules so expo-modules-core's plugin can attach the "release"
    // SoftwareComponent during autolinking. Without this the
    // `:expo` aggregator project fails with:
    //   "Could not get unknown property 'release' for SoftwareComponent container"
    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }

    // Sources live at the conventional `src/main/java/com/mindvibe/kiaan/voice/`
    // path under this gradle module's projectDir. We deliberately do NOT
    // augment `sourceSets.main.java.srcDirs` to point outside the workspace
    // tree — see the file-header comment for the empty-AAR failure mode that
    // happened when an earlier version reached out via
    // `../../../../native/android/voice/kiaan`.
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    // React Native core — provided by the host app at link time.
    implementation 'com.facebook.react:react-native:+'

    // Kotlin coroutines — used by KiaanVoiceManager state machine,
    // KiaanComputeTrinity dispatcher routing, KiaanWakeWordDetector
    // recording loop, KiaanEngineOrchestrator parallel inference.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${COROUTINES_VERSION}"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:${COROUTINES_VERSION}"

    // TensorFlow Lite — KiaanWakeWordDetector loads kiaan_wakeword.tflite
    // and runs inference. NnApiDelegate (NPU) lives in the main artifact
    // since TFLite 2.0+; GpuDelegate is a separate artifact.
    //
    // KiaanComputeTrinity routes wake-word/STT/emotion-detection tasks
    // to NPU first, GPU fallback, CPU last. The .tflite model file
    // itself isn't bundled in this module — apps/mobile loads it from
    // its assets/ directory at runtime.
    implementation "org.tensorflow:tensorflow-lite:${TFLITE_VERSION}"
    implementation "org.tensorflow:tensorflow-lite-gpu:${TFLITE_VERSION}"

    // AndroidX core-ktx — ContextCompat permission checks for
    // RECORD_AUDIO + the wake-word foreground capture loop.
    implementation 'androidx.core:core-ktx:1.13.1'

    // Kotlin stdlib (provided by the host but explicit here for IDE
    // resolution).
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
}

// safeExtGet is the standard Expo / RN module helper for falling back
// to a default when the host app didn't define an ext var.
def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

// Sakha Voice Native — manually-registered Android library.
//
// REGISTRATION MODEL: this module is NOT autolinked by EITHER Expo or
// React Native autolinkers. Both opt-outs live in this directory:
//
//   • Expo autolinker — opt-out via the absence of
//     `expo-module.config.json` at the workspace root.
//   • RN autolinker   — opt-out via `react-native.config.js` declaring
//     `dependency.platforms.{android,ios}: null`.
//
// Instead, the `withKiaanSakhaVoicePackages` config plugin
// (apps/mobile/plugins/withKiaanSakhaVoicePackages.js) injects the
// `include ':kiaanverse-sakha-voice-native'` line + projectDir mapping
// into apps/mobile/android/settings.gradle, plus the matching
// `implementation project(...)` dep into app/build.gradle and the
// runtime `packages.add(SakhaVoicePackage())` line into
// MainApplication.kt. See that plugin's header for why both
// autolinkers had to be bypassed (pnpm symlink causing dual-discovery
// → AGP namespace collision → the long-running
// `Unresolved reference: sakha` build failure).
//
// The Sakha persona Kotlin lives in this module's standard
// `src/main/java/com/mindvibe/kiaan/voice/sakha/` tree:
//
//   • SakhaVoiceManager           — state machine + lifecycle
//   • SakhaVoiceModule            — RN bridge module (NativeModules.SakhaVoice)
//   • SakhaVoicePackage           — ReactPackage registration target
//   • SakhaSseClient              — POST+SSE stream from /api/voice-companion/message
//   • SakhaTtsPlayer              — Sarvam REST + system TTS playback queue
//   • SakhaPauseParser            — pause-tag → PauseEvent stream
//   • SakhaPersonaGuard           — guardrail filter
//   • SakhaTypes / SakhaDictation / SakhaVerseReader / SakhaWakeWordDetector
//   • WakeWordMatcher
//
// Pattern mirrors kiaanverse-mobile/native/kiaan-voice/android/build.gradle
// so AGP / Kotlin / JVM versions stay consistent across the workspace's
// two native modules.

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'com.kiaanverse.sakha.voice'
version = '0.0.0'

def OKHTTP_VERSION = '4.12.0'
def COROUTINES_VERSION = '1.7.3'

android {
    namespace 'com.mindvibe.kiaan.voice.sakha'
    compileSdk safeExtGet('compileSdkVersion', 35)
    buildToolsVersion safeExtGet('buildToolsVersion', '35.0.0')

    defaultConfig {
        minSdk safeExtGet('minSdkVersion', 24)
        targetSdk safeExtGet('targetSdkVersion', 35)
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }

    // AGP 8 + Gradle 8 require explicit publishing config for library
    // modules so expo-modules-core's plugin can attach the "release"
    // SoftwareComponent during autolinking. Without this the
    // `:expo` aggregator project fails with:
    //   "Could not get unknown property 'release' for SoftwareComponent container"
    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }

    // Sources live at the conventional
    // `src/main/java/com/mindvibe/kiaan/voice/sakha/` path under this
    // gradle module's projectDir. The `**/test/**` exclude is kept so
    // future co-located unit tests (SakhaPauseParserTest et al.) are
    // wired into the `test` source set rather than shipping in the .aab.
    sourceSets {
        main {
            java.exclude '**/test/**'
        }
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    // React Native core — provided by the host app at link time.
    implementation 'com.facebook.react:react-native:+'

    // Kotlin coroutines — used throughout the Sakha pipeline
    // (manager state machine, SSE client, TTS player, parser).
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${COROUTINES_VERSION}"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:${COROUTINES_VERSION}"

    // OkHttp — used by SakhaSseClient (POST + SSE parser) and
    // SakhaTtsPlayer (Sarvam REST synthesise call).
    implementation "com.squareup.okhttp3:okhttp:${OKHTTP_VERSION}"

    // AndroidX core-ktx — ContextCompat permission checks.
    implementation 'androidx.core:core-ktx:1.13.1'

    // (Removed) Sibling :kiaanverse-kiaan-voice-native dep. The Expo
    // autolinker's actual generated project name varies between SDK
    // versions and the assumption that drove that dep ended up
    // mis-named at Gradle configure time. The Sakha pipeline does NOT
    // strictly require KiaanComputeTrinity — the thermal-aware
    // policies in SakhaComputeAdvisor are a Phase 3 polish that can
    // be re-enabled later via a static singleton accessor or via the
    // host app's MainApplication injection. Compiling Sakha
    // standalone restores a green build.

    // Kotlin stdlib (provided by the host but explicit here for IDE
    // resolution).
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
}

// safeExtGet is the standard Expo / RN module helper for falling back
// to a default when the host app didn't define an ext var.
def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

// Local Android module for ALL Kiaan/Sakha native code (PR #1699).
//
// Hosts:
//   • KiaanAudioPlayer + SakhaForegroundService (Media3 audio backbone)
//   • Kiaan Voice tier-1 (KiaanVoiceManager, KiaanComputeTrinity NPU/GPU/CPU
//     router, KiaanWakeWordDetector, KiaanEngineOrchestrator, KiaanVoicePackage).
//     Sources at src/main/java/com/mindvibe/kiaan/voice/.
//   • Sakha persona voice (SakhaVoiceManager, SakhaSseClient, SakhaTtsPlayer,
//     SakhaPauseParser, SakhaPersonaGuard, SakhaVoiceModule, SakhaVoicePackage,
//     SakhaWakeWordDetector, SakhaDictation, SakhaVerseReader, WakeWordMatcher).
//     Sources at src/main/java/com/mindvibe/kiaan/voice/sakha/.
//
// Why one gradle module instead of three?
//
// PRs #1685–#1698 chased the "Unresolved reference: sakha" / namespace
// collision through every layer (workspace deps, autolinker name mangling,
// pre/post-install symlink nukes). Build #14 STILL failed because EAS
// Build's caches preserved real `node_modules/@kiaanverse/{kiaan,sakha}-
// voice-native/` directories from pre-PR-#1696 builds, with stale package
// .json files that RN autolinker kept registering as the underscore form
// `:kiaanverse_{X}-voice-native` alongside the plugin's hyphen-form
// `:kiaanverse-{X}-voice-native` — same source through symlink, AGP
// namespace collision, build dies the same way every time.
//
// PR #1699 cuts the Gordian knot: physically delete `kiaanverse-mobile/
// native/{kiaan,sakha}-voice/` and merge ALL voice Kotlin into THIS
// module. Now there is exactly ONE gradle module compiling ALL voice
// classes. No workspace voice modules exist for any cache to resurrect.
// The plugin only patches MainApplication.kt to register the runtime
// ReactPackages — it no longer needs withSettingsGradle.
//
// AndroidX Media3 ExoPlayer is the audio backbone (replaces the old
// com.google.android.exoplayer2 namespace). TFLite + kotlinx-coroutines
// + okhttp added for the merged voice modules.
//
// Multiple Kotlin packages in one Android library: the AAR's `namespace`
// (com.kiaanverse.sakha.audio) is only for R/BuildConfig generation.
// Kotlin source files declare any `package` (com.mindvibe.kiaan.voice.*,
// com.kiaanverse.sakha.audio) and all compile into the same AAR. R8 keep
// rules in app.config.ts reference all three top-level packages.

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'com.kiaanverse.sakha'
version = '1.0.0'

def MEDIA3_VERSION = '1.4.1'
def TFLITE_VERSION = '2.14.0'
def COROUTINES_VERSION = '1.7.3'
def OKHTTP_VERSION = '4.12.0'

android {
    namespace 'com.kiaanverse.sakha.audio'
    compileSdk safeExtGet('compileSdkVersion', 35)
    buildToolsVersion safeExtGet('buildToolsVersion', '35.0.0')

    defaultConfig {
        minSdk safeExtGet('minSdkVersion', 24)   // Android 7.0 — RN baseline
        targetSdk safeExtGet('targetSdkVersion', 35)
        versionCode 1
        versionName '1.0.0'
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    // React Native core — provided by the host app at link time
    implementation 'com.facebook.react:react-native:+'

    // Expo modules core for autolinking
    implementation 'expo.modules:expomodulescore:+'

    // AndroidX Media3 — the audio pipeline. ExoPlayer + DataSource +
    // ProgressiveMediaSource. Locked to 1.4.x (Sakha tested against
    // ConcatenatingMediaSource2 which lands in 1.4 stable).
    implementation "androidx.media3:media3-exoplayer:${MEDIA3_VERSION}"
    implementation "androidx.media3:media3-datasource:${MEDIA3_VERSION}"
    implementation "androidx.media3:media3-common:${MEDIA3_VERSION}"
    implementation "androidx.media3:media3-session:${MEDIA3_VERSION}"

    // Kotlin coroutines — used by KiaanVoiceManager state machine,
    // KiaanComputeTrinity dispatcher routing, KiaanWakeWordDetector
    // recording loop, KiaanEngineOrchestrator parallel inference,
    // SakhaVoiceManager state machine, SakhaSseClient streaming.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${COROUTINES_VERSION}"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:${COROUTINES_VERSION}"

    // TensorFlow Lite — KiaanWakeWordDetector loads kiaan_wakeword.tflite
    // and runs inference. NnApiDelegate (NPU) lives in the main artifact
    // since TFLite 2.0+; GpuDelegate is a separate artifact.
    implementation "org.tensorflow:tensorflow-lite:${TFLITE_VERSION}"
    implementation "org.tensorflow:tensorflow-lite-gpu:${TFLITE_VERSION}"

    // OkHttp — SakhaSseClient streams from /api/voice-companion/message.
    implementation "com.squareup.okhttp3:okhttp:${OKHTTP_VERSION}"

    // Foreground service notification compat
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.media:media:1.7.0'

    // Kotlin stdlib (provided by the host but explicit here for IDE
    // resolution)
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
}

// safeExtGet is the standard Expo / RN module helper for falling back
// to a default when the host app didn't define an ext var.
def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest-cov pytest-asyncio

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run backend tests (pytest)
        run: |
          pytest tests/ --cov=backend --cov-report=xml --cov-report=term-missing --cov-fail-under=49 -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:

      - name: Run frontend tests (vitest)
        run: npm run test:coverage

      - name: TypeScript type checking
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage.xml
            coverage/
          retention-days: 30

  deploy-backend:
    name: Deploy Backend to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK not configured, skipping deployment"
            exit 0
          fi

          response=$(curl -s -w "\n%{http_code}" -f --max-time 30 --retry 3 --retry-delay 5 -X POST "$RENDER_DEPLOY_HOOK")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Backend deployment triggered successfully (HTTP $http_code)"
          else
            echo "::error::Render deploy hook failed with HTTP $http_code"
            echo "Response: $body"
            exit 1
          fi

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://mindvibe-api.onrender.com"
          fi

          echo "Checking backend health at $BACKEND_URL/health"

          for i in 1 2 3 4 5; do
            if curl -sf "$BACKEND_URL/health" > /dev/null; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "::warning::Backend health check failed after 5 attempts"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "Frontend deployment complete"

      - name: Verify deployment
        run: |
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://mindvibe.vercel.app"
          fi

          echo "Verifying frontend deployment at $FRONTEND_URL"

          for i in 1 2 3 4 5; do
            if curl -sf "$FRONTEND_URL" > /dev/null; then
              echo "Frontend verification passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "::warning::Frontend verification failed after 5 attempts"

  smoke-test:
    name: Production Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install httpx pytest pytest-asyncio

      - name: Test KIAAN endpoint
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://mindvibe-api.onrender.com"
          fi

          echo "Testing KIAAN at $BACKEND_URL/api/chat/health"

          response=$(curl -sf "$BACKEND_URL/api/chat/health" || echo '{"status":"unavailable"}')
          echo "Response: $response"

          if echo "$response" | grep -q "KIAAN"; then
            echo "KIAAN identity verified"
          else
            echo "::warning::Could not verify KIAAN identity (service may be starting)"
          fi

      - name: Test subscription API
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://mindvibe-api.onrender.com"
          fi

          echo "Testing subscription API at $BACKEND_URL/api/subscriptions/tiers"

          response=$(curl -sf "$BACKEND_URL/api/subscriptions/tiers" || echo '[]')
          echo "Response: $response"

          if echo "$response" | grep -q "tier"; then
            echo "Subscription API responding"
          else
            echo "::warning::Subscription API response unexpected"
          fi

      - name: Test Gita verses endpoint
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://mindvibe-api.onrender.com"
          fi

          echo "Testing Gita API at $BACKEND_URL/api/gita/chapters"

          response=$(curl -sf "$BACKEND_URL/api/gita/chapters" || echo '[]')

          if [ -n "$response" ]; then
            echo "Gita API accessible"
          else
            echo "::warning::Gita API not responding"
          fi

      - name: Smoke test summary
        run: |
          echo "========================================="
          echo "Production Smoke Tests Complete"
          echo "========================================="
          echo ""
          echo "Services Tested:"
          echo "  - KIAAN Chat API"
          echo "  - Subscription API"
          echo "  - Gita Wisdom API"

  notify-success:
    name: Deployment Success Notification
    needs: [smoke-test]
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment success
        run: |
          echo "========================================="
          echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "========================================="
          echo ""
          echo "Deployed Services:"
          echo "  - Backend: Render"
          echo "  - Frontend: Vercel"
          echo ""
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u)"

name: IP Hygiene Guard

# Fails the build if anyone re-introduces:
#   - URLs to copyrighted third-party translation sources (vedabase, asitis,
#     holy-bhagavad-gita, gitapress, iskcondesiretree, sivanandaonline, iskcon.org)
#   - Diagnostic signature phrases from known copyrighted Gita translations
#   - Embedded English/Hindi translations in code (long Latin-script strings
#     attached to a `translation:` / `english:` / `.english =` site)
#   - Removal of the ingestion-disabled env-flag gates
#
# Triggers on every push to main and every PR. Treat this as a regression
# tripwire — if the build fails here, do NOT bypass; remediate the source.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  forbidden-sources:
    name: No copyrighted upstream URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep for forbidden source URLs
        run: |
          set -e
          FORBIDDEN_URLS=(
            "vedabase.io"
            "asitis.com"
            "holy-bhagavad-gita.org"
            "iskcondesiretree.com"
            "iskcon.org"
            "sivanandaonline.org"
            "gitapress.org"
          )
          HITS=0
          for url in "${FORBIDDEN_URLS[@]}"; do
            # Allow mentions in IP-strategy docs + this workflow itself
            count=$(grep -r -n "$url" \
              --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
              --include='*.json' --include='*.yaml' --include='*.yml' \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
              --exclude-dir=_telang_baseline \
              . 2>/dev/null \
              | grep -v ".github/workflows/ip-hygiene.yml" \
              | grep -v "drafts/" \
              | wc -l || echo 0)
            if [ "$count" -gt 0 ]; then
              echo "::error::Forbidden source URL '$url' found in code ($count hits)."
              grep -r -n "$url" \
                --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
                --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
                --exclude-dir=_telang_baseline \
                . 2>/dev/null \
                | grep -v ".github/workflows/ip-hygiene.yml" \
                | grep -v "drafts/" \
                | head -10
              HITS=$((HITS + count))
            fi
          done
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Total forbidden-URL hits: $HITS. Do NOT merge."
            exit 1
          fi
          echo "✓ No forbidden source URLs in code."

  forbidden-signature-phrases:
    name: No copyrighted translation signature phrases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep for known signature phrases
        run: |
          set -e
          # Each entry is a phrase strongly associated with a copyrighted
          # modern Gita translation. Presence in code = derivative content.
          FORBIDDEN_PHRASES=(
            "Supreme Personality of Godhead"
            "scion of Bharata"
            "descendant of Bharata"
            "Never consider yourself the cause of the result"
            "perform your prescribed dut"
            "abandon all varieties of dharma"
            "abandon all varieties of religion"
          )
          HITS=0
          for phrase in "${FORBIDDEN_PHRASES[@]}"; do
            count=$(grep -ri -l "$phrase" \
              --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
              --include='*.json' --include='*.md' \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
              --exclude-dir=_telang_baseline \
              . 2>/dev/null \
              | grep -v ".github/workflows/ip-hygiene.yml" \
              | wc -l || echo 0)
            if [ "$count" -gt 0 ]; then
              echo "::error::Signature phrase '$phrase' found in $count file(s)."
              grep -ri -n "$phrase" \
                --include='*.py' --include='*.ts' --include='*.tsx' \
                --exclude-dir=node_modules --exclude-dir=.git \
                . 2>/dev/null \
                | grep -v ".github/workflows/ip-hygiene.yml" \
                | head -5
              HITS=$((HITS + count))
            fi
          done
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Total signature-phrase hits: $HITS. These match copyrighted modern translations."
            exit 1
          fi
          echo "✓ No copyrighted signature phrases detected."

  embedded-translations:
    name: No long embedded translation strings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "grep for translation/english fields with long Latin-script values"
        run: |
          set -e
          # Long strings (50+ chars, starting with capital-lowercase) attached
          # to translation:/english: in source code are presumed to be embedded
          # derivative translation content. Tests use a placeholder marker that
          # is allowlisted below.
          # /tests/ excluded — tests use the placeholder marker (Phase 1G)
          # and may legitimately have non-Gita translations (i18n service tests).
          HITS=$(grep -rn -E \
            "(translation|english)[\"\\']?\\s*[:=]\\s*[\"\\']([A-Z][a-z][^\"\\']{50,})[\"\\']" \
            --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
            --exclude-dir=_telang_baseline --exclude-dir=tests \
            . 2>/dev/null \
            | grep -v "<placeholder pending PD-baseline rebuild>" \
            | grep -v ".github/workflows/ip-hygiene.yml" \
            | grep -v "drafts/" \
            | wc -l || echo 0)
          if [ "$HITS" -gt 0 ]; then
            echo "::error::$HITS embedded long translation strings detected. Likely derivative content."
            grep -rn -E \
              "(translation|english)[\"\\']?\\s*[:=]\\s*[\"\\']([A-Z][a-z][^\"\\']{50,})[\"\\']" \
              --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
              --exclude-dir=_telang_baseline --exclude-dir=tests \
              . 2>/dev/null \
              | grep -v "<placeholder pending PD-baseline rebuild>" \
              | grep -v ".github/workflows/ip-hygiene.yml" \
              | head -10
            exit 1
          fi
          echo "✓ No embedded translation strings in code."

  ingestion-gates-intact:
    name: External-ingestion gates intact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify all 6 scrapers still gated
        run: |
          set -e
          # Each of these files should still contain the env-flag gate.
          # If anyone removes the gate, this check fails.
          GATED_FILES=(
            "backend/services/gita_wisdom_auto_enricher.py"
            "backend/services/kiaan_learning_engine.py"
            "backend/services/gita_social_ingestion.py"
            "backend/services/youtube_transcript_service.py"
            "backend/services/kiaan_learning_daemon.py"
            "backend/services/indian_data_sources.py"
          )
          MISSING=0
          for f in "${GATED_FILES[@]}"; do
            if [ -f "$f" ]; then
              if ! grep -q "MINDVIBE_EXTERNAL_INGESTION_ENABLED" "$f"; then
                echo "::error::$f no longer contains the MINDVIBE_EXTERNAL_INGESTION_ENABLED gate!"
                MISSING=$((MISSING + 1))
              fi
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING ingestion gates are missing. External scrapers could re-execute."
            exit 1
          fi
          echo "✓ All 6 external-ingestion gates intact."

  seed-gates-intact:
    name: Gita seed-script gates intact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify all 10 Gita seed scripts still gated
        run: |
          set -e
          SEED_FILES=(
            "scripts/seed_gita_wisdom.py"
            "scripts/seed_gita_from_json.py"
            "scripts/seed_complete_gita.py"
            "scripts/seed_authentic_gita_comprehensive.py"
            "scripts/seed_essential_data.py"
            "scripts/seed_practical_wisdom.py"
            "scripts/seed_wisdom.py"
            "scripts/seed_gita_robust.py"
            "scripts/seed_gita_sync.py"
            "scripts/seed_content.py"
          )
          MISSING=0
          for f in "${SEED_FILES[@]}"; do
            if [ -f "$f" ]; then
              if ! grep -q "MINDVIBE_GITA_SEED_ENABLED" "$f"; then
                echo "::error::$f no longer contains the MINDVIBE_GITA_SEED_ENABLED gate!"
                MISSING=$((MISSING + 1))
              fi
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING Gita seed-script gates are missing."
            exit 1
          fi
          echo "✓ All 10 Gita seed-script gates intact."

  silero-license:
    name: Silero VAD model is MIT-licensed (legacy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: confirm only the legacy (MIT) Silero VAD model ships
        run: |
          set -e
          if [ -f "public/vad/silero_vad_v5.onnx" ]; then
            echo "::error::silero_vad_v5.onnx is back — Silero v4+ has a restrictive commercial license."
            exit 1
          fi
          if [ ! -f "public/vad/silero_vad_legacy.onnx" ]; then
            echo "::warning::silero_vad_legacy.onnx (MIT v3 model) is missing — VAD won't work."
          fi
          # And confirm the VAD hook still requests the legacy model
          if [ -f "hooks/useVoiceActivityDetection.ts" ]; then
            if ! grep -q "model: 'legacy'" hooks/useVoiceActivityDetection.ts; then
              echo "::warning::useVoiceActivityDetection.ts no longer pins MicVAD to 'legacy' — review."
            fi
          fi
          echo "✓ Silero VAD pinned to MIT-licensed v3 (legacy)."

  llama-3-purged:
    name: Llama 3 references removed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: confirm no Llama 3 model_id references in production code
        run: |
          set -e
          # Allow comments that explain WHY Llama 3 was removed; block actual
          # model_id="llama3:..." or repo_id="QuantFactory/Meta-Llama-3..."
          HITS=$(grep -rn -E \
            '(model_id\s*=\s*["\x27]llama3:|repo_id\s*=\s*["\x27]QuantFactory/Meta-Llama-3)' \
            --include='*.py' --include='*.ts' --include='*.tsx' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next \
            . 2>/dev/null | wc -l || echo 0)
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Llama 3 model references are back. Meta's license requires 'Built with Meta Llama 3' attribution + AUP acceptance."
            grep -rn -E \
              '(model_id\s*=\s*["\x27]llama3:|repo_id\s*=\s*["\x27]QuantFactory/Meta-Llama-3)' \
              --include='*.py' --include='*.ts' --include='*.tsx' \
              --exclude-dir=node_modules --exclude-dir=.git \
              . 2>/dev/null | head -5
            exit 1
          fi
          echo "✓ No Llama 3 model_id references in code."

name: Deploy Enhancement Features

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests before deploy
      run: python -m pytest tests/unit/ -v

    - name: Deploy to Fly.io
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      run: |
        if [ -z "$FLY_API_TOKEN" ]; then
          echo "::warning::FLY_API_TOKEN not configured, skipping Fly.io deployment"
          exit 0
        fi
        curl -L https://fly.io/install.sh | sh
        /root/.fly/bin/flyctl deploy

    - name: Health check Fly.io
      run: |
        BACKEND_URL="${{ secrets.FLY_APP_URL }}"
        if [ -z "$BACKEND_URL" ]; then
          BACKEND_URL="https://mindvibe-api.fly.dev"
        fi
        sleep 10
        curl -f --max-time 15 "$BACKEND_URL/health" || echo "::warning::Fly.io health check failed"

    - name: Deploy to Render
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_DEPLOY_HOOK" ]; then
          echo "::warning::RENDER_DEPLOY_HOOK not configured, skipping"
          exit 0
        fi
        curl -f --max-time 30 --retry 3 -X POST "$RENDER_DEPLOY_HOOK"

    - name: Deployment Success
      run: echo "Enhancement services deployed successfully"

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, '.py') || contains(github.event.head_commit.added, '.py') || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install black ruff mypy pytest-cov pytest-asyncio types-requests

      - name: Run black (format check)
        run: |
          black --check --diff .

      - name: Run ruff (linter)
        run: |
          ruff check .

      - name: Run mypy (type checker)
        run: |
          mypy backend/
        env:
          MYPYPATH: ${{ github.workspace }}

      - name: Run Python tests with coverage
        run: |
          if [ -d "tests" ]; then pytest --cov=backend --cov-report=xml --cov-report=term-missing --cov-fail-under=49; fi

      - name: Upload Python test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: |
            coverage.xml
            .coverage
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && hashFiles('coverage.xml') != ''
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

      - name: Comment PR with coverage
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        continue-on-error: true
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 50
          MINIMUM_ORANGE: 20

  nodejs-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build Next.js project
        run: npm run build

      - name: Upload Node.js test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nodejs-test-results
          path: |
            coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && hashFiles('coverage/coverage-final.json') != ''
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: javascript
          name: javascript-coverage
          fail_ci_if_error: false

  mobile-validate:
    name: Validate kiaanverse-mobile plugins + contracts
    runs-on: ubuntu-latest
    # Always run on PRs (cheap — no install needed for the validators);
    # on pushes to main, only run when something under kiaanverse-mobile/
    # actually changed. The validators are the early-warning system that
    # keeps a regressed Expo config plugin / WSS frame / tool contract
    # from reaching EAS Build (which would burn ~30min + $$ before
    # surfacing the regression). They run in seconds with zero external
    # network calls — the validate-voice-plugin script stubs out
    # @expo/config-plugins so it works without `pnpm install`.
    if: |
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits.*.modified), 'kiaanverse-mobile/') ||
      contains(toJSON(github.event.commits.*.added), 'kiaanverse-mobile/') ||
      contains(toJSON(github.event.commits.*.removed), 'kiaanverse-mobile/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Expo config plugins (smoke + load)
        working-directory: kiaanverse-mobile/apps/mobile
        run: node scripts/validate-plugins.mjs

      - name: Validate withKiaanSakhaVoicePackages — 30 patch checks
        working-directory: kiaanverse-mobile/apps/mobile
        # Exercises the plugin's settings.gradle / app/build.gradle /
        # MainApplication.kt patch functions against synthetic Expo SDK 51
        # prebuild output. This is the regression gate that would have
        # caught build #16's "Unresolved reference" failure offline.
        run: node scripts/validate-voice-plugin.mjs

      - name: Validate WSS frame types match between TS + Python
        working-directory: kiaanverse-mobile/apps/mobile
        # 17 frame types must agree across the WSS subprotocol on both
        # sides; drift would cause subprotocol-mismatch on every voice
        # session (server returns close code 4001 PERSONA_MISMATCH).
        run: node scripts/validate-wss-types.mjs

      - name: Validate 15 tool prefill contracts
        working-directory: kiaanverse-mobile/apps/mobile
        # Tool contracts (allowed_fields, min_confidence, scrub rules)
        # must match exactly between TS (apps/mobile/voice/lib/) and
        # Python (backend/services/voice/). Drift = wrong prefill data
        # to user-visible tools.
        run: node scripts/validate-tool-contracts.mjs

      - name: Validate pure helper invariants
        working-directory: kiaanverse-mobile/apps/mobile
        # Spec-pinned constants (confidence threshold 0.75, nav delay
        # = 60% of ack capped at 3.5s, prefill stringification before
        # navigate). Regressions here are silent feature breakage.
        run: node scripts/test-pure-helpers.mjs

  security-audit:
    runs-on: ubuntu-latest
    if: always()
    needs: [python-tests, nodejs-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run Python dependency security check (Safety)
        run: safety check

      - name: Run Python static security analysis (Bandit)
        run: bandit -r backend/ -f json -o bandit-report.json || true && bandit -r backend/

      - name: Run secrets scanning (detect-secrets)
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.secrets\.baseline$' > .secrets-scan-results.json
          detect-secrets audit --report --json .secrets-scan-results.json || echo "Review secrets scan results in artifacts"

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets-scan-results.json
          retention-days: 30

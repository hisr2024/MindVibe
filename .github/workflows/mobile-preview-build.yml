name: Mobile Preview Build

on:
  push:
    branches:
      - develop
    paths:
      - 'kiaanverse-mobile/**'
  # Manual dispatch lets maintainers preview-build any branch (e.g. a
  # feature branch with an open PR) without first merging to develop.
  # Useful for verifying an EAS build before review-merge — this branch
  # itself burned 20 builds chasing an Android voice issue, exactly the
  # case workflow_dispatch is for.
  workflow_dispatch:
    inputs:
      platform:
        description: 'EAS build platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      clear_cache:
        description: 'Pass --clear-cache to eas build (slower, fresh native build)'
        required: false
        default: false
        type: boolean

concurrency:
  group: mobile-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-build:
    name: EAS Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: kiaanverse-mobile
        run: pnpm install --frozen-lockfile

      - name: Validate Expo config plugins + frame contracts (pre-flight)
        working-directory: kiaanverse-mobile/apps/mobile
        # Run all five offline validators BEFORE handing off to EAS.
        # A plugin regression caught here saves ~30 minutes of EAS
        # time and prevents the "Unresolved reference" / "Could not
        # find injection point" class of failures that consumed builds
        # #1-17. Each validator runs in <1s with zero network calls.
        run: |
          node scripts/validate-plugins.mjs
          node scripts/validate-voice-plugin.mjs
          node scripts/validate-wss-types.mjs
          node scripts/validate-tool-contracts.mjs
          node scripts/test-pure-helpers.mjs
          node scripts/validate-bridge-coverage.mjs

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build preview
        working-directory: kiaanverse-mobile/apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # On push-to-develop, defaults to all-platforms. On manual
          # dispatch, the maintainer picks platform + cache strategy.
          PLATFORM: ${{ github.event.inputs.platform || 'all' }}
          CLEAR_CACHE: ${{ github.event.inputs.clear_cache || 'false' }}
        run: |
          EXTRA=""
          if [ "$CLEAR_CACHE" = "true" ]; then
            EXTRA="--clear-cache"
            echo "::notice::Building with --clear-cache (fresh native build)"
          fi
          echo "Running: eas build --platform $PLATFORM --profile preview --non-interactive $EXTRA"
          eas build --platform "$PLATFORM" --profile preview --non-interactive $EXTRA

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="Preview build succeeded"
          else
            EMOJI=":x:"
            TEXT="Preview build failed"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${EMOJI} ${TEXT} for \`${{ github.ref_name }}\` (commit: \`${{ github.sha }}\`)\"}"

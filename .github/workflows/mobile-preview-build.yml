name: Mobile Preview Build

on:
  push:
    branches:
      - develop
    paths:
      - 'kiaanverse-mobile/**'

concurrency:
  group: mobile-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-build:
    name: EAS Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: kiaanverse-mobile
        run: pnpm install --frozen-lockfile

      - name: Validate Expo config plugins + frame contracts (pre-flight)
        working-directory: kiaanverse-mobile/apps/mobile
        # Run all five offline validators BEFORE handing off to EAS.
        # A plugin regression caught here saves ~30 minutes of EAS
        # time and prevents the "Unresolved reference" / "Could not
        # find injection point" class of failures that consumed builds
        # #1-17. Each validator runs in <1s with zero network calls.
        run: |
          node scripts/validate-plugins.mjs
          node scripts/validate-voice-plugin.mjs
          node scripts/validate-wss-types.mjs
          node scripts/validate-tool-contracts.mjs
          node scripts/test-pure-helpers.mjs

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build preview (all platforms)
        working-directory: kiaanverse-mobile/apps/mobile
        run: eas build --platform all --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="Preview build succeeded"
          else
            EMOJI=":x:"
            TEXT="Preview build failed"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${EMOJI} ${TEXT} for \`${{ github.ref_name }}\` (commit: \`${{ github.sha }}\`)\"}"

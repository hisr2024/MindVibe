name: Mobile Production Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: kiaanverse-mobile
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build production (all platforms)
        working-directory: kiaanverse-mobile/apps/mobile
        run: eas build --platform all --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  submit:
    name: Submit to App Stores
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: kiaanverse-mobile
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Submit to Google Play Store
        working-directory: kiaanverse-mobile/apps/mobile
        run: eas submit --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Apple App Store
        working-directory: kiaanverse-mobile/apps/mobile
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

name: Mobile OTA Update

# Publishes a JavaScript-only EAS Update to the `production` channel on every
# push to `main` that touches mobile sources.
#
# WHY THIS EXISTS:
#   Without this workflow, merging PRs to `main` does NOT reach installed
#   APKs/IPAs. `mobile-production-release.yml` only fires on `v*.*.*` tag
#   pushes (full store submission), so JS-only changes that landed via PR
#   merge stay invisible on devices until someone manually tags a release.
#   That's the "merged a new PR but the app shows the old build" symptom.
#
# WHAT IT DOES:
#   `eas update --branch production --channel production` publishes the new
#   JS bundle. The app's `expo-updates` module (configured in
#   `apps/mobile/app.config.ts` with `runtimeVersion: { policy: 'appVersion' }`)
#   downloads it on next cold start and reloads with the fresh code.
#
# WHAT IT DOES NOT DO:
#   Native changes (new permissions, native modules, version bump, app icon,
#   splash, anything in `app.config.ts` `ios`/`android` blocks) are NOT
#   shippable as OTA — they require a new APK/IPA via the existing
#   `mobile-production-release.yml` (push a `v*.*.*` tag).
#
#   To skip OTA on a commit that's purely native / non-functional, include
#   `[skip ota]` in the commit message.

on:
  push:
    branches: [main]
    paths:
      - 'kiaanverse-mobile/**'
      - '!kiaanverse-mobile/**/*.md'
      - '!kiaanverse-mobile/**/README*'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message (defaults to commit subject)'
        required: false
        type: string

concurrency:
  group: mobile-ota-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish EAS Update
    if: ${{ !contains(github.event.head_commit.message, '[skip ota]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # We need the previous commit so the native-change guard below can
          # diff HEAD against HEAD^ for package.json / app.config.ts changes.
          fetch-depth: 2

      - name: Guard — refuse OTA if native layer changed without version bump
        id: native_guard
        run: |
          # When a commit adds/removes a native Expo module (package.json) or
          # edits the native blocks of app.config.ts (permissions, plugins,
          # bundle ids, versionCode/version), OTA is NOT a safe delivery
          # mechanism — users on the old APK lack the corresponding native
          # code. Require a companion version bump in the SAME commit, which
          # flips the runtimeVersion (policy: appVersion) and partitions the
          # new JS bundle away from the old APK's OTA train.
          NATIVE_FILES_CHANGED=$(git diff --name-only HEAD^ HEAD -- \
            kiaanverse-mobile/apps/mobile/package.json \
            kiaanverse-mobile/apps/mobile/app.config.ts \
            kiaanverse-mobile/apps/mobile/plugins/ \
            'kiaanverse-mobile/apps/mobile/android/**' \
            'kiaanverse-mobile/apps/mobile/ios/**' \
            || true)

          if [ -z "$NATIVE_FILES_CHANGED" ]; then
            echo "No native-layer changes — safe to OTA."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Native-layer files changed:"
          echo "$NATIVE_FILES_CHANGED"

          # A version bump in app.config.ts means the PR author consciously
          # cut a new APK train. In that case OTA is still useful (it would
          # target the NEW runtimeVersion once the APK is published) but it's
          # also harmless to skip — the Play release flow will publish its
          # own bundle. Be conservative and skip.
          if echo "$NATIVE_FILES_CHANGED" | grep -q 'app.config.ts'; then
            VERSION_BUMPED=$(git diff HEAD^ HEAD -- \
              kiaanverse-mobile/apps/mobile/app.config.ts \
              | grep -E "^[+][^+].*(version:[[:space:]]*'|versionCode:[[:space:]])" \
              || true)
            if [ -n "$VERSION_BUMPED" ]; then
              echo "::notice::app.config.ts version bumped — skipping OTA, tag a v*.*.* release to ship native changes."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "::error::Native layer changed without a version bump in app.config.ts."
          echo "::error::Publishing an OTA here would push JS that imports native modules the installed APK doesn't have."
          echo "::error::Either (a) bump version + versionCode in app.config.ts and tag a v*.*.* release, or (b) add [skip ota] to the commit message if the change is truly native-only."
          exit 1

      - name: Setup pnpm
        if: steps.native_guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        if: steps.native_guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.native_guard.outputs.skip != 'true'
        working-directory: kiaanverse-mobile
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        if: steps.native_guard.outputs.skip != 'true'
        run: npm install -g eas-cli

      - name: Verify EXPO_TOKEN is set
        if: steps.native_guard.outputs.skip != 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not configured. OTA updates cannot be published."
            exit 1
          fi

      - name: Publish OTA update to production channel
        if: steps.native_guard.outputs.skip != 'true'
        working-directory: kiaanverse-mobile/apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          if [ -n "$INPUT_MESSAGE" ]; then
            MSG="$INPUT_MESSAGE"
          else
            # Fall back to the commit subject for traceability in EAS dashboard.
            MSG=$(git log -1 --pretty=%s)
          fi
          echo "Publishing EAS update: $MSG"
          # The `production` channel must be mapped to the `production` branch
          # before this runs. One-time setup:
          #   eas channel:edit production --branch production
          # Newer eas-cli versions reject --channel and --branch together, so we
          # publish to the branch only and rely on the pre-configured mapping.
          eas update \
            --branch production \
            --message "$MSG" \
            --non-interactive

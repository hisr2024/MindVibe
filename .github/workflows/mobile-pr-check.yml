name: Mobile PR Check

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'kiaanverse-mobile/**'

concurrency:
  group: mobile-pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiaanverse-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Prettier check
        run: pnpm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiaanverse-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type checking
        run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiaanverse-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest tests
        run: pnpm run test

  bundle-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiaanverse-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kiaanverse-mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export bundle
        working-directory: kiaanverse-mobile/apps/mobile
        run: npx expo export --platform web

      - name: Check bundle size
        working-directory: kiaanverse-mobile/apps/mobile
        run: |
          BUNDLE_SIZE=$(du -sm dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}MB"
          if [ "$BUNDLE_SIZE" -gt 30 ]; then
            echo "::error::Bundle size ${BUNDLE_SIZE}MB exceeds 30MB limit"
            exit 1
          fi
          echo "Bundle size ${BUNDLE_SIZE}MB is within the 30MB limit"

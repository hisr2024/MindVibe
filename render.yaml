services:
  # Backend API Service
  - type: web
    name: mindvibe-api
    env: python
    plan: standard
    region: oregon
    # The index build script is skipped if the index file already exists (idempotent).
    # This avoids blocking every deploy with an expensive rebuild.
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python scripts/build-relationship-compass-index-local.py
    preDeployCommand: python scripts/run_migrations.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindvibe-db
          property: connectionString
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: EDDSA_ENABLED
        value: "false"
      - key: PYTHONPATH
        value: "."
      # Security settings
      - key: DB_SSL_MODE
        value: "require"
      - key: ENVIRONMENT
        value: "production"
      - key: SECURE_COOKIE
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      # Redis caching (REQUIRED for multi-instance distributed state)
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_REQUIRED
        value: "false"
      - key: REDIS_URL
        fromService:
          type: redis
          name: mindvibe-redis
          property: connectionString
      # Disable startup migrations — preDeployCommand already runs them
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "false"
      # Multi-instance scaling — reduced pool sizes for PgBouncer compatibility
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_MAX_OVERFLOW
        value: "5"
      # Sentry error tracking (set DSN in Render Dashboard)
      - key: SENTRY_DSN
        value: ""
      # Encryption key for data at rest (generated securely)
      - key: ENCRYPTION_KEY
        generateValue: true
      # Spiritual wellness data encryption key (must match MINDVIBE_REFLECTION_KEY)
      - key: MINDVIBE_REFLECTION_KEY
        generateValue: true
      # Email provider: "console" logs emails (dev), "smtp" sends real emails.
      # Set to "smtp" and configure SMTP_* vars in Render Dashboard to enable
      # verification emails, password resets, etc.
      - key: EMAIL_PROVIDER
        value: "console"
      # Auto-disabled when EMAIL_PROVIDER != smtp to prevent user lockout
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
    healthCheckPath: /health
    # Autoscaling settings — scale to 10 instances for up to 1,000 concurrent users
    scaling:
      minInstances: 1
      maxInstances: 10
      targetMemoryPercent: 75
      targetCPUPercent: 70

  # Redis Cache Service
  - type: redis
    name: mindvibe-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only allow internal connections

databases:
  # PostgreSQL Database with SSL enforced
  - name: mindvibe-db
    plan: standard
    # databaseName and user are set here as Render blueprint defaults.
    # The actual connection string is injected via the DATABASE_URL envVar
    # above (fromDatabase), so these only affect initial provisioning.
    databaseName: mindvibe
    user: navi
    # SSL is enabled by default on Render PostgreSQL

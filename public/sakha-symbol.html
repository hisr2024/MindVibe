<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sakha — Divine Symbol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+Devanagari:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #D4AF37;
    --gold-light: #F5E27A;
    --gold-pale: #FFF8DC;
    --deep-blue: #050A1A;
    --mid-blue: #0A1535;
    --teal: #00B4D8;
    --lotus: #FF6B9D;
    --white-glow: rgba(255,255,255,0.92);
    --aura: rgba(212,175,55,0.18);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--deep-blue);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ── Accessibility ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Cosmos Background ── */
  .cosmos {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%,
      #0E1E45 0%, #070F28 50%, #020710 100%);
    overflow: hidden;
  }
  .cosmos::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 82% 14%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 78%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 66% 55%, rgba(212,175,55,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 72% 90%, rgba(212,175,55,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 45%, rgba(255,255,255,0.3) 0%, transparent 100%);
    animation: starfield 25s linear infinite alternate;
  }
  @keyframes starfield {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.04); }
  }

  /* ── Scene container ── */
  .scene {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: min(520px, 95vw);
    gap: 0;
    will-change: transform;
    transition: transform 0.12s ease-out;
  }

  /* ── Outer Mandala Glow Ring ── */
  .mandala-wrap {
    position: relative;
    width: min(420px, 88vw);
    height: min(420px, 88vw);
    display: flex; align-items: center; justify-content: center;
  }

  /* Outermost divine aura */
  .aura-outer {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(212,175,55,0.0) 35%,
      rgba(212,175,55,0.06) 55%,
      rgba(212,175,55,0.18) 72%,
      rgba(212,175,55,0.08) 85%,
      transparent 100%);
    animation: aurapulse 4s ease-in-out infinite;
  }
  @keyframes aurapulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  /* SVG Mandala */
  .mandala-svg {
    position: absolute;
    width: 100%; height: 100%;
    animation: mandalaspin 90s linear infinite;
    filter: drop-shadow(0 0 12px rgba(212,175,55,0.55));
  }
  .mandala-svg-rev {
    position: absolute;
    width: 78%; height: 78%;
    animation: mandalaspin 60s linear infinite reverse;
    filter: drop-shadow(0 0 8px rgba(0,180,216,0.4));
  }
  @keyframes mandalaspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── Central OM Symbol ── */
  .om-stage {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 10;
  }

  .om-glow-bg {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(212,175,55,0.28) 0%,
      rgba(212,175,55,0.10) 45%,
      transparent 75%);
    animation: omglow 3.5s ease-in-out infinite;
  }
  @keyframes omglow {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .om-text {
    position: relative;
    font-size: clamp(72px, 17vw, 100px);
    line-height: 1;
    background: linear-gradient(160deg, #FFF8DC 0%, #F5E27A 30%, #D4AF37 55%, #A0792A 80%, #F5E27A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(212,175,55,0.9)) drop-shadow(0 0 40px rgba(212,175,55,0.5));
    animation: ombreath 3.5s ease-in-out infinite;
    font-family: 'Noto Sans Devanagari', serif;
    user-select: none;
  }
  @keyframes ombreath {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(212,175,55,0.8)) drop-shadow(0 0 36px rgba(212,175,55,0.4)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 28px rgba(255,240,120,1)) drop-shadow(0 0 55px rgba(212,175,55,0.7)); }
  }

  /* Vibration rings emanating from OM */
  .vib-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(212,175,55,0.5);
    animation: vibexpand 3.5s ease-out infinite;
    pointer-events: none;
  }
  .vib-ring:nth-child(1) { width: 120px; height: 120px; animation-delay: 0s; }
  .vib-ring:nth-child(2) { width: 120px; height: 120px; animation-delay: 1.16s; }
  .vib-ring:nth-child(3) { width: 120px; height: 120px; animation-delay: 2.33s; }
  @keyframes vibexpand {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  /* ── Lotus petals ring ── */
  .lotus-ring {
    position: absolute;
    width: 100%; height: 100%;
    animation: lotusspin 30s linear infinite reverse;
  }
  .lotus-petal {
    position: absolute;
    width: 22px; height: 44px;
    left: 50%; top: 50%;
    transform-origin: 50% 100%;
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    background: linear-gradient(180deg, rgba(255,107,157,0.7) 0%, rgba(255,107,157,0.15) 100%);
    filter: blur(0.5px);
  }
  @keyframes lotusspin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  /* ── Chakra dots ── */
  .chakra-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle, #00E5FF 0%, #0077B6 100%);
    box-shadow: 0 0 10px #00E5FF, 0 0 20px rgba(0,229,255,0.6);
    animation: chakrapulse 2s ease-in-out infinite;
  }
  @keyframes chakrapulse {
    0%, 100% { transform: scale(1) translateX(-50%) translateY(-50%); opacity: 0.9; }
    50% { transform: scale(1.5) translateX(-50%) translateY(-50%); opacity: 1; }
  }

  /* ── Text below ── */
  .label-wrap {
    display: flex; flex-direction: column; align-items: center;
    margin-top: clamp(-20px, -3vw, -10px);
    gap: 4px;
  }

  .sakha-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 400;
    letter-spacing: 0.18em;
    background: linear-gradient(120deg, #FFF8DC 0%, #F5E27A 35%, #D4AF37 60%, #FFF8DC 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 2px 16px rgba(212,175,55,0.5));
    animation: nameshine 5s ease-in-out infinite;
    background-size: 200% auto;
  }
  @keyframes nameshine {
    0% { background-position: 0% center; }
    50% { background-position: 100% center; }
    100% { background-position: 0% center; }
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(13px, 3.2vw, 17px);
    letter-spacing: 0.22em;
    color: rgba(212,175,55,0.75);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sanskrit {
    font-family: 'Noto Sans Devanagari', 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.8vw, 14px);
    color: rgba(212,175,55,0.45);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  /* Gold divider line */
  .divider {
    width: 180px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), rgba(255,240,150,0.9), rgba(212,175,55,0.6), transparent);
    margin: 10px 0 6px;
    animation: divglow 3s ease-in-out infinite;
  }
  @keyframes divglow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; box-shadow: 0 0 8px rgba(212,175,55,0.5); }
  }

  /* ── Floating particles ── */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: floatup linear infinite;
    opacity: 0;
  }
  @keyframes floatup {
    0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.5); opacity: 0; }
  }

  /* ===========================================================
     RESPONSIVE: MOBILE (320px–767px)
     =========================================================== */

  /* ── Tiny phones (iPhone SE / 320px) ── */
  @media (max-width: 374px) {
    .scene { width: 98vw; }
    .mandala-wrap { width: min(280px, 85vw); height: min(280px, 85vw); }
    .om-glow-bg { width: 110px; height: 110px; }
    .om-text { font-size: 56px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 80px; height: 80px; }
    .sakha-name { font-size: 22px; letter-spacing: 0.12em; }
    .tagline { font-size: 11px; letter-spacing: 0.15em; }
    .sanskrit { font-size: 10px; }
    .divider { width: 120px; }
    .chakra-dot { width: 5px; height: 5px; }
  }

  /* ── Standard phones (375px–413px) ── */
  @media (min-width: 375px) and (max-width: 413px) {
    .mandala-wrap { width: min(340px, 86vw); height: min(340px, 86vw); }
    .om-glow-bg { width: 140px; height: 140px; }
    .om-text { font-size: 66px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 95px; height: 95px; }
    .sakha-name { font-size: 26px; }
    .tagline { font-size: 12px; }
    .divider { width: 150px; }
    .chakra-dot { width: 6px; height: 6px; }
  }

  /* ── Large phones (414px–767px) ── */
  @media (min-width: 414px) and (max-width: 767px) {
    .mandala-wrap { width: min(380px, 88vw); height: min(380px, 88vw); }
    .om-glow-bg { width: 160px; height: 160px; }
    .om-text { font-size: 78px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 110px; height: 110px; }
    .chakra-dot { width: 7px; height: 7px; }
  }

  /* ── Landscape mobile ── */
  @media (max-height: 500px) and (orientation: landscape) {
    .scene {
      flex-direction: row;
      width: 96vw;
      gap: 28px;
    }
    .mandala-wrap { width: min(260px, 52vh); height: min(260px, 52vh); }
    .om-glow-bg { width: 100px; height: 100px; }
    .om-text { font-size: 50px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 70px; height: 70px; }
    .label-wrap {
      margin-top: 0;
      align-items: flex-start;
    }
    .sakha-name { font-size: 24px; }
    .tagline { font-size: 11px; text-align: left; }
    .sanskrit { font-size: 10px; text-align: left; }
    .divider { width: 120px; }
    .chakra-dot { width: 5px; height: 5px; }
  }

  /* ===========================================================
     RESPONSIVE: TABLET (768px–1023px)
     =========================================================== */
  @media (min-width: 768px) and (max-width: 1023px) {
    .scene { width: min(560px, 72vw); }
    .mandala-wrap { width: min(440px, 56vw); height: min(440px, 56vw); }
    .om-glow-bg { width: 190px; height: 190px; }
    .om-text { font-size: 96px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 130px; height: 130px; }
    .sakha-name { font-size: 38px; letter-spacing: 0.22em; }
    .tagline { font-size: 16px; letter-spacing: 0.28em; }
    .sanskrit { font-size: 13px; margin-top: 10px; }
    .divider { width: 200px; }
    .chakra-dot { width: 9px; height: 9px; }
  }

  /* ===========================================================
     RESPONSIVE: DESKTOP (1024px–1439px)
     =========================================================== */
  @media (min-width: 1024px) and (max-width: 1439px) {
    .scene { width: min(620px, 48vw); }
    .mandala-wrap { width: min(480px, 42vw, 72vh); height: min(480px, 42vw, 72vh); }
    .om-glow-bg { width: 210px; height: 210px; }
    .om-text { font-size: 104px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 140px; height: 140px; }
    .sakha-name { font-size: 44px; letter-spacing: 0.22em; }
    .tagline { font-size: 18px; letter-spacing: 0.3em; }
    .sanskrit { font-size: 14px; margin-top: 12px; }
    .divider { width: 220px; }
    .chakra-dot { width: 9px; height: 9px; }
  }

  /* ===========================================================
     RESPONSIVE: WIDE DESKTOP (1440px+)
     =========================================================== */
  @media (min-width: 1440px) {
    .scene { width: min(700px, 38vw); }
    .mandala-wrap { width: min(540px, 34vw, 76vh); height: min(540px, 34vw, 76vh); }
    .om-glow-bg { width: 240px; height: 240px; }
    .om-text { font-size: 116px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 160px; height: 160px; }
    .sakha-name { font-size: 50px; letter-spacing: 0.24em; }
    .tagline { font-size: 19px; letter-spacing: 0.32em; }
    .sanskrit { font-size: 15px; margin-top: 14px; letter-spacing: 0.12em; }
    .divider { width: 260px; }
    .chakra-dot { width: 10px; height: 10px; }
  }

  /* ===========================================================
     RESPONSIVE: ULTRAWIDE (1920px+)
     =========================================================== */
  @media (min-width: 1920px) {
    .scene { width: min(780px, 30vw); }
    .mandala-wrap { width: min(600px, 28vw, 78vh); height: min(600px, 28vw, 78vh); }
    .om-glow-bg { width: 270px; height: 270px; }
    .om-text { font-size: 128px; }
    .vib-ring:nth-child(1),
    .vib-ring:nth-child(2),
    .vib-ring:nth-child(3) { width: 180px; height: 180px; }
    .sakha-name { font-size: 56px; letter-spacing: 0.26em; }
    .tagline { font-size: 20px; letter-spacing: 0.35em; }
    .sanskrit { font-size: 16px; margin-top: 16px; }
    .divider { width: 300px; }
    .chakra-dot { width: 11px; height: 11px; }
  }
</style>
</head>
<body>

<div class="cosmos"></div>

<!-- Floating divine particles -->
<div id="particles"></div>

<div class="scene" id="scene">

  <div class="mandala-wrap">
    <!-- Outer aura glow -->
    <div class="aura-outer"></div>

    <!-- Lotus petals ring (outermost) -->
    <div class="lotus-ring" id="lotusRing"></div>

    <!-- Outer rotating mandala -->
    <svg class="mandala-svg" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="goldRing" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#F5E27A" stop-opacity="0.9"/>
          <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#A0792A" stop-opacity="0.3"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Main circle rings -->
      <circle cx="200" cy="200" r="192" stroke="url(#goldRing)" stroke-width="0.8" opacity="0.5"/>
      <circle cx="200" cy="200" r="182" stroke="#D4AF37" stroke-width="0.4" opacity="0.3"/>
      <circle cx="200" cy="200" r="170" stroke="#F5E27A" stroke-width="1.2" opacity="0.6" filter="url(#glow)"/>

      <!-- 12-point outer star petals -->
      <g filter="url(#glow)" opacity="0.55">
        <path d="M200 8 L210 190 L200 198 L190 190 Z" fill="#D4AF37"/>
        <path d="M392 200 L210 210 L202 200 L210 190 Z" fill="#D4AF37"/>
        <path d="M200 392 L190 210 L200 202 L210 210 Z" fill="#D4AF37"/>
        <path d="M8 200 L190 190 L198 200 L190 210 Z" fill="#D4AF37"/>
      </g>

      <!-- 8-petal lotus ring at radius 155 -->
      <g opacity="0.45" filter="url(#glow)">
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(0 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(45 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(90 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(135 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(180 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(225 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(270 200 200)"/>
        <ellipse cx="200" cy="50" rx="10" ry="26" fill="#D4AF37" transform="rotate(315 200 200)"/>
      </g>

      <!-- Outer geometric diamond ring -->
      <g stroke="#F5E27A" stroke-width="0.6" opacity="0.5" fill="none" filter="url(#glow)">
        <polygon points="200,32 368,200 200,368 32,200"/>
        <polygon points="200,32 368,200 200,368 32,200" transform="rotate(22.5 200 200)"/>
        <polygon points="200,32 368,200 200,368 32,200" transform="rotate(45 200 200)"/>
      </g>

      <!-- Mid decorative circles -->
      <circle cx="200" cy="200" r="130" stroke="#D4AF37" stroke-width="0.6" opacity="0.4" stroke-dasharray="4 6"/>
      <circle cx="200" cy="200" r="110" stroke="#F5E27A" stroke-width="0.8" opacity="0.35"/>

      <!-- Teal accents at cardinal points of mid ring -->
      <circle cx="200" cy="70" r="4" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
      <circle cx="330" cy="200" r="4" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
      <circle cx="200" cy="330" r="4" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
      <circle cx="70" cy="200" r="4" fill="#00E5FF" opacity="0.8" filter="url(#glow)"/>
    </svg>

    <!-- Inner counter-rotating mandala -->
    <svg class="mandala-svg-rev" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow2">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Sri Yantra-ish triangles -->
      <g opacity="0.6" filter="url(#glow2)">
        <!-- Upward triangle (Shiva) -->
        <polygon points="200,60 340,290 60,290" stroke="#F5E27A" stroke-width="1.5" fill="rgba(212,175,55,0.04)"/>
        <!-- Downward triangle (Shakti) -->
        <polygon points="200,340 60,110 340,110" stroke="#00B4D8" stroke-width="1.2" fill="rgba(0,180,216,0.04)"/>
        <!-- Inner upward -->
        <polygon points="200,110 300,260 100,260" stroke="#F5E27A" stroke-width="1" fill="rgba(212,175,55,0.05)"/>
        <!-- Inner downward -->
        <polygon points="200,290 100,140 300,140" stroke="#00B4D8" stroke-width="0.8" fill="rgba(0,180,216,0.05)"/>
        <!-- Core star -->
        <polygon points="200,155 235,215 165,215" stroke="#FFD700" stroke-width="1.2" fill="rgba(255,215,0,0.08)"/>
        <polygon points="200,245 235,185 165,185" stroke="#00B4D8" stroke-width="1" fill="rgba(0,180,216,0.08)"/>
      </g>

      <!-- Inner sacred circle -->
      <circle cx="200" cy="200" r="60" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
      <circle cx="200" cy="200" r="45" stroke="#F5E27A" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 5"/>

      <!-- 6-dot hexagonal -->
      <g fill="#F5E27A" opacity="0.5" filter="url(#glow2)">
        <circle cx="200" cy="142" r="2.5"/>
        <circle cx="251" cy="171" r="2.5"/>
        <circle cx="251" cy="229" r="2.5"/>
        <circle cx="200" cy="258" r="2.5"/>
        <circle cx="149" cy="229" r="2.5"/>
        <circle cx="149" cy="171" r="2.5"/>
      </g>
    </svg>

    <!-- Vibration rings from center -->
    <div class="vib-ring"></div>
    <div class="vib-ring"></div>
    <div class="vib-ring"></div>

    <!-- Central OM -->
    <div class="om-stage">
      <div class="om-glow-bg"></div>
      <div class="om-text">ॐ</div>
    </div>

    <!-- Chakra dots placed on the mandala circle -->
    <div class="chakra-dot" style="left:50%;top:14%;transform:translateX(-50%) translateY(-50%);"></div>
    <div class="chakra-dot" style="left:84%;top:30%;transform:translateX(-50%) translateY(-50%);animation-delay:0.5s;"></div>
    <div class="chakra-dot" style="left:84%;top:70%;transform:translateX(-50%) translateY(-50%);animation-delay:1s;"></div>
    <div class="chakra-dot" style="left:50%;top:86%;transform:translateX(-50%) translateY(-50%);animation-delay:1.5s;"></div>
    <div class="chakra-dot" style="left:16%;top:70%;transform:translateX(-50%) translateY(-50%);animation-delay:2s;"></div>
    <div class="chakra-dot" style="left:16%;top:30%;transform:translateX(-50%) translateY(-50%);animation-delay:2.5s;"></div>

  </div><!-- /mandala-wrap -->

  <!-- Text labels -->
  <div class="label-wrap">
    <div class="divider"></div>
    <div class="sakha-name">Sakha</div>
    <div class="tagline">Your Divine Companion</div>
    <div class="sanskrit">सखा — तव दिव्यः साथी</div>
  </div>

</div><!-- /scene -->

<script>
  // ── Lotus petals ──
  const lotusRing = document.getElementById('lotusRing');
  const isMobile = window.innerWidth < 768;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const petalCount = isMobile ? 12 : 16;

  for (let i = 0; i < petalCount; i++) {
    const p = document.createElement('div');
    p.className = 'lotus-petal';
    const angle = (i / petalCount) * 360;
    const rad = 47;
    const px = 50 + rad * Math.sin(angle * Math.PI / 180);
    const py = 50 - rad * Math.cos(angle * Math.PI / 180);
    const petalH = isMobile ? (24 + (i % 4) * 3) : (30 + (i % 4) * 5);
    const petalW = isMobile ? (12 + (i % 2) * 3) : (14 + (i % 2) * 4);
    p.style.cssText = `
      left: ${px}%;
      top: ${py}%;
      transform: translate(-50%, -100%) rotate(${angle}deg);
      opacity: ${0.3 + (i % 3) * 0.15};
      height: ${petalH}px;
      width: ${petalW}px;
      background: linear-gradient(180deg,
        rgba(255,107,157,${0.5 + (i % 3) * 0.1}) 0%,
        rgba(212,175,55,0.1) 100%);
    `;
    lotusRing.appendChild(p);
  }

  // ── Floating golden motes — fewer on mobile ──
  const particleWrap = document.getElementById('particles');
  const particleCount = isMobile ? 14 : 28;

  if (!prefersReducedMotion) {
    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1.5;
      const isGold = Math.random() > 0.4;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}vw;
        bottom: ${Math.random() * 20}vh;
        background: radial-gradient(circle, ${isGold ? '#F5E27A' : '#00E5FF'}, transparent);
        box-shadow: 0 0 ${size * 2}px ${isGold ? '#D4AF37' : '#00B4D8'};
        animation-duration: ${8 + Math.random() * 14}s;
        animation-delay: ${Math.random() * 12}s;
        --drift: ${(Math.random() - 0.5) * 80}px;
      `;
      particleWrap.appendChild(p);
    }
  }

  // ── Desktop: subtle parallax on mouse ──
  if (!isMobile && !prefersReducedMotion) {
    const scene = document.getElementById('scene');
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
      scene.style.transform = `translate(${dx * 6}px, ${dy * 4}px)`;
    });
  }

  // ── Mobile: gyroscope tilt parallax ──
  if (isMobile && !prefersReducedMotion && window.DeviceOrientationEvent) {
    const scene = document.getElementById('scene');
    const handleOrientation = (e) => {
      if (e.gamma === null || e.beta === null) return;
      const dx = Math.max(-1, Math.min(1, e.gamma / 30));
      const dy = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
      scene.style.transform = `translate(${dx * 5}px, ${dy * 3}px)`;
    };

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.body.addEventListener('touchstart', function reqGyro() {
        DeviceOrientationEvent.requestPermission()
          .then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation); })
          .catch(() => {});
        document.body.removeEventListener('touchstart', reqGyro);
      }, { once: true });
    } else {
      window.addEventListener('deviceorientation', handleOrientation);
    }
  }
</script>
</body>
</html>

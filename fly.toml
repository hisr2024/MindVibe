app = "mindvibe-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  REDIS_ENABLED = "true"
  REDIS_REQUIRED = "true"
  PGBOUNCER_ENABLED = "false"
  DB_POOL_SIZE = "10"
  DB_MAX_OVERFLOW = "5"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/monitoring/health"

# WebSocket session affinity — ensures a client's WebSocket connection
# stays pinned to the same instance for the duration of the session.
[http_service.session_affinity]
  enabled = true

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

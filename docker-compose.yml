# No top-level `version:` key — Docker Compose V2+ (the `docker compose` CLI
# plugin) ignores it and treats it as obsolete.  Omitting it silences the
# "version is obsolete" warning while remaining compatible with V1 (`docker-compose`)
# which defaults to the latest schema when the key is absent.

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mindvibe-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mindvibe}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindvibe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindvibe-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mindvibe-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindvibe-network

  # PgBouncer Connection Pooler — multiplexes application connections to PostgreSQL.
  # With multiple API instances, each instance needs fewer direct DB connections.
  # PgBouncer's transaction-mode pooling allows 200+ app connections to share
  # a smaller pool of real database connections (default: 40).
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: mindvibe-pgbouncer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mindvibe}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 40
      MAX_CLIENT_CONN: 200
      MAX_DB_CONNECTIONS: 50
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindvibe-network

  # Backend API (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    container_name: mindvibe-api
    environment:
      # Route through PgBouncer (port 6432) for connection multiplexing
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-mindvibe}
      - PGBOUNCER_ENABLED=true
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=5
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_ENABLED=true
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./migrations:/app/migrations
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mindvibe-network

  # Frontend Web (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runner
    container_name: mindvibe-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mindvibe-network

volumes:
  db_data:

networks:
  mindvibe-network:
    driver: bridge

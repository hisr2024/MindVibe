<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1024px; height: 500px; overflow: hidden; font-family: 'Inter', sans-serif; }
.banner {
  width: 1024px; height: 500px; position: relative;
  background: linear-gradient(135deg, #0B0B0F 0%, #1A1520 40%, #0F1219 100%);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
/* Cosmic particles */
.particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,215,0,0.8), transparent);
}
.p1 { width: 4px; height: 4px; top: 80px; left: 120px; opacity: 0.6; }
.p2 { width: 3px; height: 3px; top: 150px; left: 800px; opacity: 0.4; }
.p3 { width: 5px; height: 5px; top: 350px; left: 180px; opacity: 0.5; }
.p4 { width: 3px; height: 3px; top: 420px; left: 700px; opacity: 0.3; }
.p5 { width: 4px; height: 4px; top: 60px; left: 500px; opacity: 0.5; }
.p6 { width: 3px; height: 3px; top: 300px; left: 900px; opacity: 0.4; }
.p7 { width: 4px; height: 4px; top: 200px; left: 50px; opacity: 0.3; }
.p8 { width: 3px; height: 3px; top: 440px; left: 400px; opacity: 0.4; }
/* Glow rings */
.ring {
  position: absolute; border-radius: 50%; border: 1px solid;
}
.ring1 { width: 600px; height: 600px; top: -50px; left: -100px; border-color: rgba(255,183,71,0.06); }
.ring2 { width: 400px; height: 400px; top: 50px; right: -50px; border-color: rgba(15,181,201,0.05); }
.ring3 { width: 300px; height: 300px; bottom: -80px; left: 350px; border-color: rgba(199,125,255,0.04); }
/* Central glow */
.glow {
  position: absolute; width: 500px; height: 500px;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, rgba(255,107,53,0.04) 40%, transparent 70%);
  border-radius: 50%;
}
/* Content */
.content {
  position: relative; z-index: 10; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.logo-area {
  display: flex; align-items: center; gap: 20px;
}
.lotus-icon { width: 80px; height: 80px; }
.app-name {
  font-size: 56px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #FF6B35 0%, #F7931E 35%, #FFB347 70%, #FFD700 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tagline {
  font-size: 22px; font-weight: 600; color: #e8edf5;
  letter-spacing: 0.5px; opacity: 0.9;
}
.subtitle {
  font-size: 15px; font-weight: 400; color: #a0a0a0;
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px;
}
.kiaan-badge {
  margin-top: 8px; padding: 8px 24px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(30,58,138,0.4), rgba(37,99,235,0.2));
  border: 1px solid rgba(106,215,255,0.2);
  color: #6ad7ff; font-size: 13px; font-weight: 600; letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="banner">
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>
  <div class="ring ring3"></div>
  <div class="glow"></div>
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>
  <div class="particle p8"></div>

  <div class="content">
    <div class="logo-area">
      <!-- Inline lotus icon -->
      <svg class="lotus-icon" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fg1" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF6B35"/>
            <stop offset="35%" stop-color="#F7931E"/>
            <stop offset="70%" stop-color="#FFB347"/>
            <stop offset="100%" stop-color="#FFD700"/>
          </linearGradient>
          <radialGradient id="fg2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFFEF0"/>
            <stop offset="40%" stop-color="#FFE4B5"/>
            <stop offset="100%" stop-color="#FFD700"/>
          </radialGradient>
          <linearGradient id="fg3" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%" stop-color="#F7931E"/>
            <stop offset="50%" stop-color="#FFB347"/>
            <stop offset="100%" stop-color="#FFD700"/>
          </linearGradient>
        </defs>
        <g transform="translate(256, 256)">
          <path d="M0 -140 C20 -120, 40 -80, 40 -40 C40 -20, 24 0, 0 8 C-24 0, -40 -20, -40 -40 C-40 -80, -20 -120, 0 -140Z" fill="url(#fg3)" opacity="0.9"/>
          <path d="M-120 -16 C-100 -36, -60 -48, -20 -40 C-8 -28, 0 -12, 4 4 C-16 12, -52 16, -80 4 C-108 -8, -128 -12, -120 -16Z" fill="url(#fg1)" opacity="0.85"/>
          <path d="M120 -16 C100 -36, 60 -48, 20 -40 C8 -28, 0 -12, -4 4 C16 12, 52 16, 80 4 C108 -8, 128 -12, 120 -16Z" fill="url(#fg1)" opacity="0.85"/>
          <path d="M-100 54 C-80 40, -40 32, -8 44 C0 60, 4 80, 4 100 C-16 108, -60 100, -88 80 C-116 60, -124 56, -100 54Z" fill="url(#fg3)" opacity="0.75"/>
          <path d="M100 54 C80 40, 40 32, 8 44 C0 60, -4 80, -4 100 C16 108, 60 100, 88 80 C116 60, 124 56, 100 54Z" fill="url(#fg3)" opacity="0.75"/>
          <path d="M0 -80 C14 -60, 24 -24, 24 8 C24 28, 14 44, 0 52 C-14 44, -24 28, -24 8 C-24 -24, -14 -60, 0 -80Z" fill="url(#fg2)"/>
          <ellipse cx="0" cy="-4" rx="24" ry="28" fill="url(#fg2)" opacity="0.95"/>
          <ellipse cx="0" cy="-8" rx="12" ry="16" fill="#FFFEF5" opacity="0.9"/>
        </g>
      </svg>
      <span class="app-name">Sakha</span>
    </div>
    <div class="tagline">Your Divine Spiritual Companion</div>
    <div class="subtitle">Change begins with self</div>
    <div class="kiaan-badge">POWERED BY KIAAN</div>
  </div>
</div>
</body>
</html>

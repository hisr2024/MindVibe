<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
body { width: 512px; height: 512px; overflow: hidden; }
.icon { width: 512px; height: 512px; }
</style>
</head>
<body>
<div class="icon">
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#101E42"/>
      <stop offset="60%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#060C20"/>
    </radialGradient>
    <radialGradient id="discBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E1A3A"/>
      <stop offset="70%" stop-color="#0A1230"/>
      <stop offset="100%" stop-color="#070E28"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(80,160,240,0.2)"/>
      <stop offset="50%" stop-color="rgba(40,100,200,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="40%" stop-color="rgba(180,210,255,0.6)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle particles -->
  <circle cx="68" cy="78" r="1" fill="rgba(160,190,240,0.3)"/>
  <circle cx="440" cy="65" r="1" fill="rgba(160,190,240,0.25)"/>
  <circle cx="55" cy="420" r="1" fill="rgba(160,190,240,0.2)"/>
  <circle cx="455" cy="435" r="1" fill="rgba(160,190,240,0.25)"/>
  <circle cx="256" cy="38" r="0.8" fill="rgba(200,180,120,0.15)"/>
  <circle cx="480" cy="256" r="0.8" fill="rgba(200,180,120,0.15)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(40,80,160,0.06)" stroke-width="40" filter="url(#blur8)"/>

  <!-- Main disc background -->
  <circle cx="256" cy="256" r="195" fill="url(#discBg)" stroke="rgba(50,90,170,0.25)" stroke-width="2"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="180" fill="url(#coreGlow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(50,100,180,0.18)" stroke-width="1"/>

  <!-- Second ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(50,100,180,0.12)" stroke-width="0.8"/>

  <!-- Star of David — UP triangle -->
  <polygon
    points="256,106 366,296 146,296"
    fill="rgba(40,80,160,0.06)"
    stroke="rgba(140,170,210,0.35)"
    stroke-width="1.2"
    stroke-linejoin="round"
  />

  <!-- Star of David — DOWN triangle -->
  <polygon
    points="256,406 146,216 366,216"
    fill="rgba(40,80,160,0.06)"
    stroke="rgba(140,170,210,0.35)"
    stroke-width="1.2"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon (where triangles overlap) -->
  <polygon
    points="256,216 310,247 310,296 256,327 202,296 202,247"
    fill="none"
    stroke="rgba(100,160,220,0.15)"
    stroke-width="0.8"
  />

  <!-- Middle circle -->
  <circle cx="256" cy="271" r="68" fill="none" stroke="rgba(70,130,200,0.22)" stroke-width="1"/>

  <!-- Inner circle -->
  <circle cx="256" cy="271" r="45" fill="none" stroke="rgba(80,140,210,0.18)" stroke-width="0.8"/>

  <!-- Innermost circle -->
  <circle cx="256" cy="271" r="25" fill="none" stroke="rgba(90,150,220,0.15)" stroke-width="0.8"/>

  <!-- Center dot glow -->
  <circle cx="256" cy="271" r="18" fill="url(#dotGlow)" filter="url(#blur4)"/>
  <circle cx="256" cy="271" r="6" fill="rgba(200,220,255,0.9)"/>
  <circle cx="256" cy="271" r="3" fill="white"/>

  <!-- Cardinal teal dots on outer ring -->
  <circle cx="256" cy="61" r="5" fill="rgba(60,190,230,0.6)" filter="url(#blur2)"/>
  <circle cx="256" cy="61" r="2.5" fill="rgba(80,200,240,0.8)"/>

  <circle cx="256" cy="451" r="5" fill="rgba(60,190,230,0.6)" filter="url(#blur2)"/>
  <circle cx="256" cy="451" r="2.5" fill="rgba(80,200,240,0.8)"/>

  <circle cx="61" cy="256" r="5" fill="rgba(60,190,230,0.6)" filter="url(#blur2)"/>
  <circle cx="61" cy="256" r="2.5" fill="rgba(80,200,240,0.8)"/>

  <circle cx="451" cy="256" r="5" fill="rgba(60,190,230,0.6)" filter="url(#blur2)"/>
  <circle cx="451" cy="256" r="2.5" fill="rgba(80,200,240,0.8)"/>

  <!-- Diagonal teal dots -->
  <circle cx="118" cy="118" r="4" fill="rgba(60,190,230,0.45)" filter="url(#blur2)"/>
  <circle cx="118" cy="118" r="2" fill="rgba(80,200,240,0.65)"/>

  <circle cx="394" cy="118" r="4" fill="rgba(60,190,230,0.45)" filter="url(#blur2)"/>
  <circle cx="394" cy="118" r="2" fill="rgba(80,200,240,0.65)"/>

  <circle cx="118" cy="394" r="4" fill="rgba(60,190,230,0.45)" filter="url(#blur2)"/>
  <circle cx="118" cy="394" r="2" fill="rgba(80,200,240,0.65)"/>

  <circle cx="394" cy="394" r="4" fill="rgba(60,190,230,0.45)" filter="url(#blur2)"/>
  <circle cx="394" cy="394" r="2" fill="rgba(80,200,240,0.65)"/>

  <!-- Star vertex dots -->
  <circle cx="256" cy="106" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="256" cy="106" r="1.8" fill="rgba(80,200,240,0.7)"/>

  <circle cx="366" cy="296" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="366" cy="296" r="1.8" fill="rgba(80,200,240,0.7)"/>

  <circle cx="146" cy="296" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="146" cy="296" r="1.8" fill="rgba(80,200,240,0.7)"/>

  <circle cx="256" cy="406" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="256" cy="406" r="1.8" fill="rgba(80,200,240,0.7)"/>

  <circle cx="146" cy="216" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="146" cy="216" r="1.8" fill="rgba(80,200,240,0.7)"/>

  <circle cx="366" cy="216" r="3.5" fill="rgba(60,190,230,0.5)" filter="url(#blur2)"/>
  <circle cx="366" cy="216" r="1.8" fill="rgba(80,200,240,0.7)"/>

</svg>
</div>
</body>
</html>

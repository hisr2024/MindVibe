<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Outfit', sans-serif; }
.screen {
  width: 1080px; height: 1920px; background: #080B1A;
  display: flex; flex-direction: column; padding: 80px 48px 120px;
  align-items: center; position: relative;
}
.aura {
  position: absolute; top: 200px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(15,181,201,0.08) 0%, rgba(212,160,23,0.04) 50%, transparent 70%);
  border-radius: 50%;
}
/* Header */
.header { width: 100%; position: relative; z-index: 2; margin-bottom: 16px; }
.header-row { display: flex; justify-content: space-between; align-items: center; }
.header-title {
  font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 400; color: #F5F0E8;
}
.streak-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 16px;
  background: rgba(212,160,23,0.08); border: 1px solid rgba(212,160,23,0.16);
}
.streak-text { font-size: 20px; font-weight: 700; color: #D4A017; }
/* Progress */
.progress-section { width: 100%; margin-bottom: 40px; position: relative; z-index: 2; }
.progress-label { font-size: 17px; color: #7A7060; margin-bottom: 10px; }
.progress-bg { height: 8px; border-radius: 4px; background: rgba(212,160,23,0.08); }
.progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #D4A017, #F0C040); }
/* Breathing circle */
.breath-area {
  position: relative; width: 360px; height: 360px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 48px; z-index: 2;
}
.breath-ring {
  position: absolute; border-radius: 50%; border: 1.5px solid;
}
.br1 { width: 360px; height: 360px; border-color: rgba(15,181,201,0.1); }
.br2 { width: 300px; height: 300px; border-color: rgba(15,181,201,0.2); }
.br3 { width: 240px; height: 240px; border-color: rgba(15,181,201,0.3); }
.breath-center {
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(15,181,201,0.15), rgba(15,181,201,0.04), transparent);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 2;
}
.breath-label { font-size: 24px; font-weight: 600; color: #0FB5C9; }
.breath-count { font-size: 56px; font-weight: 800; color: #43D3E8; }
/* Phase steps */
.phases { width: 100%; display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; position: relative; z-index: 2; }
.phase {
  display: flex; align-items: center; gap: 20px;
  padding: 24px 28px; border-radius: 16px;
  background: #0D1229; border: 1px solid rgba(212,160,23,0.06);
}
.phase.active {
  background: rgba(15,181,201,0.06); border-color: rgba(15,181,201,0.2);
}
.phase.done { opacity: 0.5; }
.phase-num {
  width: 48px; height: 48px; border-radius: 24px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700;
}
.pn-done { background: rgba(61,139,94,0.15); color: #3D8B5E; }
.pn-active { background: linear-gradient(135deg, #0FB5C9, #43D3E8); color: #080B1A; }
.pn-pending { background: rgba(255,255,255,0.05); color: #7A7060; }
.phase-content { flex: 1; }
.phase-title { font-size: 22px; font-weight: 600; color: #F5F0E8; }
.phase-title-done { color: #7A7060; text-decoration: line-through; }
.phase-duration { font-size: 17px; color: #7A7060; margin-left: auto; }
/* Verse */
.verse-card {
  width: 100%; padding: 28px 32px; border-radius: 16px;
  background: #0D1229; border: 1px solid rgba(212,160,23,0.12);
  position: relative; z-index: 2; overflow: hidden;
}
.verse-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #D4A017, #F0C040, transparent); }
.verse-label { font-size: 15px; color: #D4A017; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 12px; }
.verse-text {
  font-family: 'Crimson Text', serif; font-size: 22px; font-style: italic;
  color: #F0C040; line-height: 1.5;
}
</style>
</head>
<body>
<div class="screen">
  <div class="aura"></div>
  <div class="header">
    <div class="header-row">
      <div class="header-title">Daily Sadhana</div>
      <div class="streak-badge"><span style="font-size:24px">🔥</span><span class="streak-text">14 Days</span></div>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-label">Phase 2 of 4 — Breathing Lotus</div>
    <div class="progress-bg"><div class="progress-fill" style="width:37%"></div></div>
  </div>
  <div class="breath-area">
    <div class="breath-ring br1"></div>
    <div class="breath-ring br2"></div>
    <div class="breath-ring br3"></div>
    <div class="breath-center">
      <div class="breath-label">Breathe In</div>
      <div class="breath-count">4s</div>
    </div>
  </div>
  <div class="phases">
    <div class="phase done">
      <div class="phase-num pn-done">✓</div>
      <div class="phase-content"><div class="phase-title phase-title-done">Set Intention</div></div>
      <div class="phase-duration">1 min</div>
    </div>
    <div class="phase active">
      <div class="phase-num pn-active">2</div>
      <div class="phase-content"><div class="phase-title">Breathing Lotus</div></div>
      <div class="phase-duration">3 min</div>
    </div>
    <div class="phase">
      <div class="phase-num pn-pending">3</div>
      <div class="phase-content"><div class="phase-title">Verse Meditation</div></div>
      <div class="phase-duration">3 min</div>
    </div>
    <div class="phase">
      <div class="phase-num pn-pending">4</div>
      <div class="phase-content"><div class="phase-title">Reflect & Seal</div></div>
      <div class="phase-duration">3 min</div>
    </div>
  </div>
  <div class="verse-card">
    <div class="verse-bar"></div>
    <div class="verse-label">TODAY'S VERSE</div>
    <div class="verse-text">"Yoga is the journey of the self, through the self, to the self." — BG 6.20</div>
  </div>
</div>
</body>
</html>
